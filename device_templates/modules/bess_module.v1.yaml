template: bess_module
version: v1

iec_61850:
  logical_nodes: [ZBAT, ZGEN, MMXU, CSWI]

contains:
  scalable:
    - { template: bess_rack.v1, count_min: 1, count_max: 24 }

measurements:
  voltage_dc:
    unit: volts
    type: float
    poll_rate_hz: 0.5
    display_name_default: "DC Voltage"
    iec_61850_ref: "MMXU1.PhV.cVal.mag.f"
  alarm_state:
    unit: none
    type: enum
    values:
      ok:    { severity: ok,    register_value: 0 }
      warn:  { severity: warn,  register_value: 1 }
      fault: { severity: alarm, register_value: 2 }
    display_name_default: "Alarm"

commands:
  set_active_power:
    verb: set
    target: active_power
    unit: watts
    payload: float
    display_name_default: "Active Power Setpoint"
  reset_alarm:
    verb: reset
    target: alarm
    unit: none
    payload: trigger
    display_name_default: "Reset Alarm"

protocol_binding_template:
  type: modbus_tcp
  register_map:
    voltage_dc: { addr: 3000, type: int16, scale: 0.1 }
