template: compute_module
version: v1

redfish:
  schema_refs: [ComputerSystem.v1_19_0, Power.v1_5_0, Thermal.v1_7_0]

contains:
  required:
    - { template: pdu.v1, count: 1 }
  scalable:
    - { template: gpu_server.v1, count_min: 1, count_max: 32 }

measurements:
  total_power_draw:
    unit: watts
    type: float
    poll_rate_hz: 1.0
    display_name_default: "Total Power Draw"
  utilization:
    unit: percent
    type: float
    poll_rate_hz: 1.0
    display_name_default: "GPU Utilization"
  thermal_headroom:
    unit: watts
    type: float
    poll_rate_hz: 0.5
    display_name_default: "Thermal Headroom"

protocol_binding_template:
  type: redfish
