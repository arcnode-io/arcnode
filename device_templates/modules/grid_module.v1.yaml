template: grid_module
version: v1

iec_61850:
  logical_nodes: [ZGEN, MMXU, CSWI, CILO]

contains:
  required:
    - { template: pcs.v1, count: 1 }
    - { template: grid_meter.v1, count: 1 }
  scalable:
    - { template: breaker.v1, count_min: 1, count_max: 4 }

measurements:
  grid_active_power:
    unit: watts
    type: float
    poll_rate_hz: 1.0
    display_name_default: "Grid Active Power"
    iec_61850_ref: "MMXU1.W.mag.f"
  grid_reactive_power:
    unit: vars
    type: float
    poll_rate_hz: 1.0
    display_name_default: "Grid Reactive Power"
  grid_frequency:
    unit: hertz
    type: float
    poll_rate_hz: 1.0
    display_name_default: "Grid Frequency"
  grid_state:
    unit: none
    type: enum
    values:
      offline:  { severity: warn, register_value: 0 }
      import:   { severity: ok,   register_value: 1 }
      export:   { severity: ok,   register_value: 2 }
      tripped:  { severity: alarm, register_value: 3 }
    display_name_default: "Grid State"

commands:
  set_active_power:
    verb: set
    target: active_power
    unit: watts
    payload: float
    display_name_default: "Active Power Setpoint"

protocol_binding_template:
  type: modbus_tcp
  register_map:
    grid_active_power:   { addr: 9000, type: int32, scale: 1.0 }
    grid_reactive_power: { addr: 9004, type: int32, scale: 1.0 }
    grid_frequency:      { addr: 9008, type: uint16, scale: 0.01 }
    grid_state:          { addr: 9020, type: uint8 }
