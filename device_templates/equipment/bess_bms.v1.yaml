template: bess_bms
version: v1

iec_61850:
  logical_nodes: [ZBAT]

measurements:
  bms_state_of_charge:
    unit: percent
    type: float
    poll_rate_hz: 1.0
    display_name_default: "State of Charge"
  bms_state_of_health:
    unit: percent
    type: float
    poll_rate_hz: 0.1
    display_name_default: "State of Health"

commands:
  reset_bms:
    verb: reset
    target: bms
    unit: none
    payload: trigger
    display_name_default: "Reset BMS"

protocol_binding_template:
  type: modbus_tcp
  register_map:
    bms_state_of_charge: { addr: 6000, type: uint16, scale: 0.01 }
    bms_state_of_health: { addr: 6002, type: uint16, scale: 0.01 }
