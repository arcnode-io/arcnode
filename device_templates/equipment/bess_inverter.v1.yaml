template: bess_inverter
version: v1

iec_61850:
  logical_nodes: [ZGEN, MMXU]

measurements:
  active_power:
    unit: watts
    type: float
    poll_rate_hz: 1.0
    display_name_default: "Active Power"
    iec_61850_ref: "MMXU1.W.mag.f"
  reactive_power:
    unit: vars
    type: float
    poll_rate_hz: 1.0
    display_name_default: "Reactive Power"
  inverter_state:
    unit: none
    type: enum
    values:
      idle:    { severity: ok,    register_value: 0 }
      running: { severity: ok,    register_value: 1 }
      fault:   { severity: alarm, register_value: 2 }
    display_name_default: "Inverter State"

commands:
  set_active_power:
    verb: set
    target: active_power
    unit: watts
    payload: float
    display_name_default: "Active Power Setpoint"
  set_reactive_power:
    verb: set
    target: reactive_power
    unit: vars
    payload: float
    display_name_default: "Reactive Power Setpoint"

protocol_binding_template:
  type: modbus_tcp
  register_map:
    active_power:    { addr: 7000, type: int32, scale: 1.0 }
    reactive_power:  { addr: 7004, type: int32, scale: 1.0 }
    inverter_state:  { addr: 7010, type: uint8 }
